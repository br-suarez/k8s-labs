apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx-deployment-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-deployment-demo
  template:
    metadata:
      labels:
        app: nginx-deployment-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
